vlm:
  model_name: "llava_v15"
  api_model_name: "llava-v1.5-7b"
  backend: "api"
  worker_url: "http://127.0.0.1:40000/worker_generate_stream"
  caption_prompt: "Describe this image in one sentence."
  generation:
    temperature: 0.2
    top_p: 0.9
    max_new_tokens: 128

sts:
  model_name: "sentence-transformers/all-MiniLM-L6-v2"

optimizer: "ga"  # "ga", "pso", or "random_search"

random_search:
  num_samples: 5  #same budget as GA and PSO, population_size * max_num_iteration = 100
  seed: 42

pso:
  swarmsize: 10
  omega: 0.5
  phip: 0.5
  phig: 0.5
  maxiter: 10
  minstep: 1e-8
  minfunc: 1e-8
  debug: true

ga:
  population_size: 10
  max_num_iteration: 10
  mutation_probability: 0.2
  elit_ratio: 0.05
  crossover_probability: 0.5
  parents_portion: 0.3
  crossover_type: "uniform"
  max_iteration_without_improv: 10
  maxfixgen: 6

transformations:
  # Fixed layout (decoded by Utils/vector_layout.py)
  var_bound:
    # ---- SP flags + params ----
    - [0, 1]           # 0  b_bright
    - [0.8, 1.2]       # 1  bright_factor
    - [0, 1]           # 2  b_blur
    - [0.0, 2.0]       # 3  blur_radius
    - [0, 1]           # 4  b_contrast
    - [0.5, 1.8]       # 5  contrast_factor
    - [0, 1]           # 6  b_saturation
    - [0.0, 2.7]       # 7  saturation_factor
    - [0, 1]           # 8  b_noise
    - [0.0, 25.0]      # 9  noise_std

    - [0, 1]           # 10 b_rotate
    - [-15.0, 15.0]    # 11 rot_angle
    - [0, 1]           # 12 b_translate
    - [-40, 40]        # 13 tx
    - [-40, 40]        # 14 ty
    - [0, 1]           # 15 b_flip
    - [0, 1]           # 16 b_shear
    - [-0.25, 0.25]    # 17 shear_x
    - [-0.25, 0.25]    # 18 shear_y
    - [0, 1]           # 19 b_zoom
    - [0.7, 1.3]       # 20 zoom_factor

    # ---- SA selector + params ----
    - [0, 3]           # 21 sa_type (0 none, 1 insert, 2 remove, 3 replace, 4 object_local_sp, 5 scale_object)
    - [0, 999]          # 22 ins_corpus_id
    - [0.5, 1.0]       # 23 ins_scale
    - [0, 30]          # 24 target_det_idx
    - [0, 999]          # 25 rep_corpus_id
    - [1.0, 3.0]       # 26 rep_scale
    - [0.6, 1.4]       # 27 obj_scale_factor


layout:
  - {index: 0,  name: "b_bright",       type: "int"}
  - {index: 1,  name: "bright_factor",  type: "float"}
  - {index: 2,  name: "b_blur",         type: "int"}
  - {index: 3,  name: "blur_radius",    type: "float"}
  - {index: 4,  name: "b_contrast",     type: "int"}
  - {index: 5,  name: "contrast_factor",type: "float"}
  - {index: 6,  name: "b_saturation",   type: "int"}
  - {index: 7,  name: "saturation_factor", type: "float"}
  - {index: 8,  name: "b_noise",        type: "int"}
  - {index: 9,  name: "noise_std",      type: "float"}

  - {index: 10, name: "b_rotate",       type: "int"}
  - {index: 11, name: "rot_angle",      type: "float"}
  - {index: 12, name: "b_translate",    type: "int"}
  - {index: 13, name: "tx",             type: "int"}
  - {index: 14, name: "ty",             type: "int"}
  - {index: 15, name: "b_flip",         type: "int"}
  - {index: 16, name: "b_shear",        type: "int"}
  - {index: 17, name: "shear_x",        type: "float"}
  - {index: 18, name: "shear_y",        type: "float"}
  - {index: 19, name: "b_zoom",         type: "int"}
  - {index: 20, name: "zoom_factor",    type: "float"}

  - {index: 21, name: "sa_type",        type: "int"}
  - {index: 22, name: "ins_corpus_id",  type: "int"}
  - {index: 23, name: "ins_scale",      type: "float"}
  - {index: 24, name: "target_det_idx", type: "int"}
  - {index: 25, name: "rep_corpus_id",  type: "int"}
  - {index: 26, name: "rep_scale",      type: "float"}
  - {index: 27, name: "obj_scale_factor", type: "float"}

paths:
  base_images_meta: "/home/ubuntu/tests/base_tests_with_captions.json"
  ga_log_path: "logs/ga_llava.jsonl"
  tmp_root: "."
  object_corpus_dir: "/home/ubuntu/last_version/Utils/objects_corpus"
  transformed_dir: "logs/transformed_images_llava_ga"

thresholds:
  psnr_min: 20.0
  yolo_topk: 10
  yolo_conf: 0.25
  sts: 0.27

llm:
  model_url: "https://router.huggingface.co/v1/chat/completions"
  api_key_env: "HF_TOKEN"
  judge_model: "meta-llama/Llama-3.3-70B-Instruct"   #meta-llama/Llama-3.1-8B-Instruct  #meta-llama/Llama-3.1-70B-Instruct #meta-llama/Llama-3.3-70B-Instruct #Qwen/Qwen2.5-72B-Instruct" #mistralai/Mistral-7B-Instruct-v0.3