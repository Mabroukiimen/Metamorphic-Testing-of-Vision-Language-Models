vlm:
  model_name: "blip_salesforce"
  backend: "cli"
  vlm_root: "/home/ubuntu/BLIP"
  python_cmd: "/home/ubuntu/miniconda3/envs/blip/bin/python"
  script_path: "/home/ubuntu/BLIP/run_blip_caption.py"
  caption_prompt: "a picture of"

sts:
  model_name: "sentence-transformers/all-MiniLM-L6-v2"

optimizer: "pso"

pso:
  swarmsize: 10
  omega: 0.5
  phip: 0.5
  phig: 0.5
  maxiter: 10
  minstep: 1e-8
  minfunc: 1e-8
  debug: true

ga:
  population_size: 10
  max_num_iteration: 10
  mutation_probability: 0.2
  elit_ratio: 0.05
  crossover_probability: 0.5
  parents_portion: 0.3
  crossover_type: "uniform"
  max_iteration_without_improv: 10
  maxfixgen: 6

transformations:
  var_bound:
    - [0, 1]
    - [0.8, 1.2]
    - [0, 1]
    - [0.0, 2.0]
    - [0, 1]
    - [-15.0, 15.0]
    - [0, 1]
    - [-40, 40]
    - [-40, 40]
    - [0, 3]
    - [0, 79]
    - [0.5, 1.2]
    - [0, 30]
    - [0, 79]
    - [0.50, 1.0]

paths:
  base_images_meta: "config/base_tests_with_captions.json"
  ga_log_path: "logs/ga_blip.jsonl"
  tmp_root: "."
  object_corpus_dir: "/home/ubuntu/segment-anything/object_corpus"
  transformed_dir: "logs/transformed_images"

thresholds:
  psnr_min: 20.0
  yolo_topk: 10
  yolo_conf: 0.25
  sts: 0.27


llm:
  model_url: "https://router.huggingface.co/v1/chat/completions"
  api_key_env: "HF_TOKEN"
  judge_model: "meta-llama/Llama-3.1-8B-Instruct"